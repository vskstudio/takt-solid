name: CI
on:
  push:
    branches: [main]
  pull_request:
# Least privilege: CI only reads the repo.
permissions:
  contents: read
# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Exercise the advertised peerDependencies.solid-js floor (^1.8) as well as
    # the current line; solid-js is a single runtime package, so swapping the
    # version after a frozen install is safe (no coupled toolchain).
    strategy:
      fail-fast: false
      matrix:
        solid: ['1.8', '1.9']
    name: build (solid@${{ matrix.solid }})
    steps:
      # Third-party actions are pinned to a full commit SHA (supply-chain
      # hardening); the trailing comment tracks the human-readable version.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm add -D solid-js@${{ matrix.solid }}
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm size
