name: Release
# Publishes to npm when a GitHub Release is published. Authenticates with a
# granular access token (NPM_TOKEN secret) that has "bypass 2FA" enabled, so
# no interactive 2FA is needed on the runner.
on:
  release:
    types: [published]
# Least privilege: publishing uses NPM_TOKEN, never the GITHUB_TOKEN.
# id-token: write is required for npm provenance attestation.
permissions:
  contents: read
  id-token: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pinned to full commit SHAs; trailing comment tracks the version.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Re-run the full gate before publishing — never ship an unverified tarball.
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm size
      - run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Generate a signed npm provenance attestation (supply-chain).
          NPM_CONFIG_PROVENANCE: true
